# ─────────────────────────────────────────────
# TAG DESCRIPTIONS
# ─────────────────────────────────────────────
tags:
  - name: Health
    description: Estado del servidor
  - name: Auth
    description: Registro, login, refresh y logout
  - name: Backoffice – Users
    description: Gestión de usuarios (requiere roles admin/staff)
  - name: Backoffice – Clients
    description: Gestión de clientes desde el backoffice (requiere roles admin/staff)
  - name: App – Users
    description: Usuarios dentro de la app (requiere autenticación)
  - name: Client – Users
    description: Usuarios del cliente autenticado (requiere roles pro/owner)
  - name: App – Clients
    description: Gestión del propio cliente (requiere roles pro/owner)
  - name: Public
    description: Endpoints públicos sin autenticación
  - name: App – Recommendations
    description: Búsqueda geoespacial de clientes (requiere rol user)
  - name: Appointments
    description: Gestión de citas (requiere roles admin/staff/pro)
  - name: Services
    description: Catálogo de servicios (requiere roles admin/staff)
  - name: Service Categories
    description: Categorías de servicios (requiere roles admin/staff)
  - name: Dashboard
    description: Métricas del cliente autenticado (requiere roles pro/owner)
  - name: Communications
    description: Mensajes y notificaciones de citas (requiere roles pro/owner/admin/staff)
