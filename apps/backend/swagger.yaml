      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, format: float }
          description: Latitud
        - name: lng
          in: query
          required: true
          schema: { type: number, format: float }
          description: Longitud
        - name: radiusKm
          in: query
          schema: { type: number, default: 10, maximum: 20 }
          description: Radio en kilómetros
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 20 }
